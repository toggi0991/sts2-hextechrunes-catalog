<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>슬더스2 증강모드(HextechRunes) 도감</title>
<style>
  :root {
    --bg: #121016;
    --panel: #1c1922;
    --panel-2: #262230;
    --border: #37324066;
    --text: #eae6f0;
    --text-dim: #a89fc0;
    --gold: #e0b24a;
    --blue: #6db4f0;
    --accent: #8a5cf6;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #241c33 0%, var(--bg) 60%);
    color: var(--text);
    font-family: "Pretendard", "Malgun Gothic", "Segoe UI", sans-serif;
    min-height: 100vh;
    /* iOS 노치/안드로이드 펀치홀 안전 영역 */
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
    background: #12101699;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  h1 {
    margin: 0 0 10px 0;
    font-size: 1.25rem;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1 1 260px; }
  #search {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::-webkit-search-cancel-button { -webkit-appearance: none; }
  .suggest {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--panel-2);
    border: 1px solid #4a4260;
    border-radius: 10px;
    z-index: 30;
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 8px 24px #000000aa;
  }
  .suggest-item {
    padding: 9px 14px;
    cursor: pointer;
    font-size: 0.88rem;
  }
  .suggest-item:hover, .suggest-item.sel { background: var(--accent); color: #fff; }
  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.85rem;
    user-select: none;
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover { color: var(--text); }
  .chip.active {
    background: linear-gradient(90deg, var(--accent), #b06cf6);
    color: #fff;
    border-color: transparent;
  }
  .count {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-left: auto;
    white-space: nowrap;
  }
  main {
    padding: 18px 20px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 16px 14px;
  }
  .card {
    background: linear-gradient(180deg, #221e2c, var(--panel) 40%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    aspect-ratio: 5 / 7;
    min-height: 0;
    transition: transform .12s, border-color .12s;
    position: relative;
  }
  .cost-orb {
    position: absolute;
    top: -9px;
    left: -9px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe9a8, #e0b24a 55%, #8a6420);
    border: 2px solid #5a4a1e;
    color: #2a2008;
    font-weight: 800;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px #00000088;
    z-index: 2;
    line-height: 1;
    text-align: center;
  }
  .card:hover {
    border-color: #5a4d78;
    transform: translateY(-2px);
  }
  .icon-wrap {
    flex: 0 0 auto;
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: var(--panel-2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
  }
  .icon-wrap.placeholder {
    color: var(--text-dim);
    font-size: 1.3rem;
  }
  .cat-strip {
    width: calc(100% + 20px);
    margin: -12px -10px 0;
    padding: 3px 0 4px;
    border-radius: 13px 13px 0 0;
    text-align: center;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-indent: 0.2em;
    background: #ffffff0d;
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .cat-strip.cat-card { color: #8fd3ff; }
  .cat-strip.cat-relic { color: var(--gold); }
  .cat-strip.cat-forge { color: #ff9e6d; }
  .cat-strip.cat-power { color: #a8f0c6; }
  .card-title {
    font-weight: 700;
    font-size: 0.88rem;
    text-align: center;
    line-height: 1.25;
    padding: 0 12px;
  }
  .badge-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    justify-content: center;
    max-width: 100%;
  }
  .badge-row .badge { white-space: nowrap; }
  .card-body {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: #4a4260 transparent;
  }
  .card-body::-webkit-scrollbar { width: 4px; }
  .card-body::-webkit-scrollbar-thumb { background: #4a4260; border-radius: 2px; }
  .badge {
    font-size: 0.62rem;
    padding: 2px 6px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .badge.card { color: #8fd3ff; }
  .badge.char { color: #b8a3f5; }
  .badge.tier-실버 { color: #c8cdd8; }
  .badge.tier-골드 { color: var(--gold); }
  .badge.tier-프리즘 {
    background: linear-gradient(90deg, #7de0ff, #c493ff, #ffb3d9);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .char-chips { font-size: 0.78rem; color: var(--text-dim); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 8px; }
  .badge.relic { color: var(--gold); }
  .badge.forge { color: #ff9e6d; }
  .badge.power { color: #a8f0c6; }
  .desc {
    font-size: 0.73rem;
    color: var(--text-dim);
    line-height: 1.45;
    text-align: center;
  }
  .desc b, .desc .kw { color: var(--gold); font-weight: 600; }
  .kw-line {
    font-size: 0.73rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.45;
  }
  .desc .num { color: var(--blue); font-weight: 600; }
  .flavor {
    margin-top: auto;
    padding-top: 4px;
    font-size: 0.65rem;
    font-style: italic;
    color: #786d94;
    text-align: center;
  }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 0;
  }
  footer {
    text-align: center;
    color: #5c5470;
    font-size: 0.75rem;
    padding: 10px 12px calc(30px + env(safe-area-inset-bottom));
  }
  /* 모바일 (안드로이드/iOS) */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 14px 10px; }
    main { padding: 14px 12px 40px; }
    header { padding: 10px 12px; }
    h1 { font-size: 1.05rem; }
    #search { padding: 8px 12px; font-size: 16px; } /* 16px 미만이면 iOS가 포커스 시 자동 확대함 */
    .chip { padding: 6px 11px; font-size: 0.78rem; }
    .card-title { font-size: 0.8rem; }
    .desc, .kw-line { font-size: 0.68rem; }
    .flavor { font-size: 0.6rem; }
    .icon-wrap { width: 52px; height: 52px; }
    .cost-orb { width: 30px; height: 30px; font-size: 0.66rem; }
  }
  @media (max-width: 360px) {
    .card-title { font-size: 0.75rem; }
    .desc, .kw-line { font-size: 0.64rem; }
  }
</style>
</head>
<body>

<header>
  <h1>슬레이 더 스파이어 2 — 증강모드(HextechRunes) 도감</h1>
  <div class="controls">
    <div class="search-wrap">
      <input id="search" type="search" autocomplete="off" autocorrect="off" autocapitalize="none"
             spellcheck="false" inputmode="search" aria-autocomplete="list"
             placeholder="이름, 설명, 플레이버 텍스트로 검색... (예: 힘, 에너지, 점화)">
      <div id="suggest" class="suggest" hidden></div>
    </div>
    <span class="chip active" data-cat="all">전체</span>
    <span class="chip" data-cat="relic">증강</span>
    <span class="chip" data-cat="forge">모루</span>
    <span class="chip" data-cat="card">카드</span>
    <span class="chip" data-cat="power">효과</span>
    <span class="count" id="count"></span>
  </div>
  <div class="char-chips">
    <span>직업:</span>
    <span class="chip char-chip active" data-char="all">전체</span>
    <span class="chip char-chip" data-char="공용">공용</span>
    <span class="chip char-chip" data-char="아이언클래드">아이언클래드</span>
    <span class="chip char-chip" data-char="사일런트">사일런트</span>
    <span class="chip char-chip" data-char="리젠트">리젠트</span>
    <span class="chip char-chip" data-char="디펙트">디펙트</span>
    <span class="chip char-chip" data-char="네크로바인더">네크로바인더</span>
    <span style="margin-left:12px">등급:</span>
    <span class="chip tier-chip active" data-tier="all">전체</span>
    <span class="chip tier-chip" data-tier="실버">실버</span>
    <span class="chip tier-chip" data-tier="골드">골드</span>
    <span class="chip tier-chip" data-tier="프리즘">프리즘</span>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다.</div>
</main>

<footer>데이터 출처: Steam Workshop 모드 "海克斯符文(HextechRunes)" — 로컬 파일에서 추출됨. 게임 밸런스 패치에 따라 최신 정보와 다를 수 있습니다.</footer>

<script>
let DATA = [];
let activeCat = "all";
let activeChar = "all";
let activeTier = "all";

const CAT_LABEL = { relic: "증강", forge: "모루", card: "카드", power: "효과" };

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function formatDesc(s) {
  if (!s) return "";
  let out = escapeHtml(s);
  out = out.replace(/\[gold\](.*?)\[\/gold\]/g, '<span class="kw">$1</span>');
  out = out.replace(/\[blue\](.*?)\[\/blue\]/g, '<span class="num">$1</span>');
  out = out.replace(/\[b\](.*?)\[\/b\]/g, '<b>$1</b>');
  out = out.replace(/\n/g, "<br>");
  return out;
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  grid.innerHTML = "";

  const filtered = DATA.filter(item => {
    const catOk = activeCat === "all" || item.subcategory === activeCat;
    if (!catOk) return false;
    const charOk = activeChar === "all"
      || (activeChar === "공용" ? item.character == null : item.character === activeChar);
    if (!charOk) return false;
    if (activeTier !== "all" && item.tier !== activeTier) return false;
    if (!q) return true;
    const hay = (item.title + " " + item.description + " " + item.flavor + " " + item.id
      + " " + (item.tier || "") + " " + (item.character || "")).toLowerCase();
    return hay.includes(q);
  });

  document.getElementById("count").textContent = filtered.length + " / " + DATA.length + "개";
  empty.style.display = filtered.length === 0 ? "block" : "none";

  const frag = document.createDocumentFragment();
  for (const item of filtered) {
    const card = document.createElement("div");
    card.className = "card";

    const iconHtml = item.icon
      ? `<div class="icon-wrap"><img src="${item.icon}" loading="lazy" alt="${escapeHtml(item.title)}"></div>`
      : `<div class="icon-wrap placeholder">?</div>`;

    const badgeRow = (item.tier || item.character)
      ? `<div class="badge-row">
          ${item.tier ? `<span class="badge tier-${item.tier}">${escapeHtml(item.tier)}</span>` : ""}
          ${item.character ? `<span class="badge char">${escapeHtml(item.character)}</span>` : ""}
        </div>`
      : "";
    card.innerHTML = `
      <div class="cat-strip cat-${item.subcategory}">${CAT_LABEL[item.subcategory] || item.subcategory}</div>
      <div class="card-title">${escapeHtml(item.title)}</div>
      ${badgeRow}
      ${iconHtml}
      <div class="card-body">
        ${item.kw_top ? `<div class="kw-line">${escapeHtml(item.kw_top.join(" · "))}</div>` : ""}
        <div class="desc">${formatDesc(item.description)}</div>
        ${item.kw_bottom ? `<div class="kw-line">${escapeHtml(item.kw_bottom.join(" · "))}</div>` : ""}
        ${item.flavor ? `<div class="flavor">${escapeHtml(item.flavor)}</div>` : ""}
      </div>
    `;

    if (item.cost != null) {
      const orb = document.createElement("div");
      orb.className = "cost-orb";
      orb.title = "에너지 코스트" + (item.cost.includes("(") ? " (괄호는 강화 시)" : "");
      orb.textContent = item.cost;
      card.appendChild(orb);
    }
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

document.querySelectorAll(".chip[data-cat]").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip[data-cat]").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeCat = chip.dataset.cat;
    render();
  });
});

document.querySelectorAll(".chip[data-char]").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip[data-char]").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeChar = chip.dataset.char;
    render();
  });
});

document.querySelectorAll(".chip[data-tier]").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip[data-tier]").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeTier = chip.dataset.tier;
    render();
  });
});

// ===== 키워드 자동완성 (한글 초성/미완성 글자 지원: "점ㅎ" → 점화, "선ㅊ" → 선천성) =====
let VOCAB = [];
const searchEl = document.getElementById("search");
const suggestEl = document.getElementById("suggest");
let selIdx = -1;

function buildVocab() {
  const set = new Set();
  const fixed = ["소모", "보존", "선천성", "천상", "사용 불가", "교활", "영원",
                 "실버", "골드", "프리즘", "공용",
                 "아이언클래드", "사일런트", "리젠트", "디펙트", "네크로바인더"];
  fixed.forEach(k => set.add(k));
  for (const d of DATA) {
    for (const m of d.description.matchAll(/\[gold\](.*?)\[\/gold\]/g)) {
      const t = m[1].replace(/\[.*?\]/g, "").trim();
      if (t && !/^\d/.test(t)) set.add(t);
    }
    if (d.title) set.add(d.title);
  }
  VOCAB = [...set];
}

const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const isSyl = c => c >= 0xAC00 && c <= 0xD7A3;

function charMatch(q, w, isLast) {
  if (q === w) return true;
  if (!isLast) return false;
  const qc = q.charCodeAt(0), wc = w.charCodeAt(0);
  // 마지막 글자가 자음 하나면 초성 매치 (점ㅎ → 점화)
  if (qc >= 0x3131 && qc <= 0x314E && isSyl(wc)) return CHO[Math.floor((wc - 0xAC00) / 588)] === q;
  // 마지막 글자가 받침 없는 글자면 초성+중성 매치 (선천서 → 선천성)
  if (isSyl(qc) && isSyl(wc) && (qc - 0xAC00) % 28 === 0)
    return Math.floor((qc - 0xAC00) / 28) === Math.floor((wc - 0xAC00) / 28);
  return false;
}

function fuzzyKrIndex(query, word) {
  // word 안에서 query가 (부분 글자 규칙으로) 시작되는 위치, 없으면 -1
  const q = query.toLowerCase(), w = word.toLowerCase();
  for (let s = 0; s + q.length <= w.length; s++) {
    let ok = true;
    for (let i = 0; i < q.length; i++) {
      if (!charMatch(q[i], w[s + i], i === q.length - 1)) { ok = false; break; }
    }
    if (ok) return s;
  }
  return -1;
}

function getSuggestions(token) {
  if (!token) return [];
  const hits = [];
  for (const w of VOCAB) {
    if (w === token) continue;
    const idx = fuzzyKrIndex(token, w);
    if (idx >= 0) hits.push([w, idx]);
  }
  // 앞에서 매치된 것 → 짧은 것 우선
  hits.sort((a, b) => (a[1] - b[1]) || (a[0].length - b[0].length));
  return hits.slice(0, 8).map(h => h[0]);
}

function lastToken(value) {
  const parts = value.split(/\s+/);
  return parts[parts.length - 1];
}

function showSuggest() {
  const token = lastToken(searchEl.value.trimStart());
  const items = getSuggestions(token);
  selIdx = -1;
  if (items.length === 0) { suggestEl.hidden = true; return; }
  suggestEl.innerHTML = items
    .map(w => `<div class="suggest-item" data-word="${escapeHtml(w)}">${escapeHtml(w)}</div>`)
    .join("");
  suggestEl.hidden = false;
}

function applySuggestion(word) {
  const parts = searchEl.value.trimStart().split(/\s+/).filter(Boolean);
  // 입력 끝부분이 선택한 단어의 일부와 겹치면(예: "전기 자극" ← "전기 자")
  // 겹치는 만큼 전부 치환해서 "전기 전기 자극" 같은 중복을 방지
  let span = 1;
  for (let n = parts.length; n >= 1; n--) {
    if (fuzzyKrIndex(parts.slice(-n).join(" "), word) >= 0) { span = n; break; }
  }
  parts.splice(parts.length - span, span, word);
  searchEl.value = parts.join(" ");
  suggestEl.hidden = true;
  render();
  searchEl.focus();
}

suggestEl.addEventListener("mousedown", e => {
  const item = e.target.closest(".suggest-item");
  if (item) { e.preventDefault(); applySuggestion(item.dataset.word); }
});

searchEl.addEventListener("input", () => { showSuggest(); render(); });
searchEl.addEventListener("blur", () => { setTimeout(() => { suggestEl.hidden = true; }, 150); });
searchEl.addEventListener("keydown", e => {
  if (suggestEl.hidden) return;
  const items = suggestEl.querySelectorAll(".suggest-item");
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    selIdx = e.key === "ArrowDown"
      ? (selIdx + 1) % items.length
      : (selIdx - 1 + items.length) % items.length;
    items.forEach((el, i) => el.classList.toggle("sel", i === selIdx));
    items[selIdx].scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter" && selIdx >= 0) {
    e.preventDefault();
    applySuggestion(items[selIdx].dataset.word);
  } else if (e.key === "Escape") {
    suggestEl.hidden = true;
  }
});

fetch("data.json")
  .then(r => r.json())
  .then(data => {
    DATA = data;
    buildVocab();
    render();
  })
  .catch(err => {
    document.getElementById("grid").innerHTML =
      '<div class="empty">data.json을 불러오지 못했습니다. 로컬 서버(예: python -m http.server)로 열어주세요.<br>' + err + '</div>';
  });
</script>

</body>
</html>
